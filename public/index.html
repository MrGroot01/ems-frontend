<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0b0e14" />

    <!-- ══════════════ SEO ══════════════ -->
    <title>EMS Pro - Employee Management System</title>
    <meta name="description" content="EMS Pro is a complete employee management system for attendance tracking, leave management, payroll, task management, and HR reports." />
    <meta name="keywords" content="EMS Pro, employee management system, attendance software, payroll software, HR dashboard, leave management" />
    <meta name="author" content="EMS Pro" />

    <!-- Google Search Console verification — replace with your code -->
    <!-- <meta name="google-site-verification" content="PASTE_YOUR_CODE_HERE" /> -->

    <!-- Open Graph (nice preview when shared on WhatsApp/social) -->
    <meta property="og:title" content="EMS Pro - Employee Management System" />
    <meta property="og:description" content="Manage attendance, leave, payroll, and tasks all in one place." />
    <meta property="og:type" content="website" />

    <!-- ══════════════ FONTS — preconnect + single load ══════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- ══════════════ THEME FLASH FIX — runs before first paint ══════════════ -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('theme') === 'light' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
